name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # 03:00 JST == 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib

    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Nobori77

      - name: Commit & Push
        run: |
          git config user.name "Nobori77"
          git config user.email "minginew77@gmail.com"
          git remote set-url origin https://github.com/Nobori77/Nobori77.git
          git add -A .
          git commit -m "generated" || exit 0
          git push
